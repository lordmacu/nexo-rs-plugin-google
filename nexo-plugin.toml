# Phase 94 — out-of-tree standalone subprocess plugin.
#
# This manifest is parsed at compile-time via `include_str!` in
# `src/main.rs` and shipped alongside the binary so the nexo-rs
# daemon's discovery walker can register the plugin without
# spawning the subprocess. Operators add the directory containing
# this file to `plugins.discovery.search_paths`.
#
# Google is a SINGLE plugin instance that manages N internal
# per-agent OAuth clients via `Vec<GooglePluginConfig>` delivered
# at `plugin.configure` time. Mirrors the email plugin's
# multi-account-internal shape.

manifest_version = 2

[plugin]
id               = "google"
version          = "0.3.0"
name             = "Google Workspace"
description      = "Google OAuth + Gmail/Calendar/Drive API tool plugin for Nexo agents."
min_nexo_version = ">=0.1.19"

# Phase 81.20.x F1 — discovery walker invokes this command with
# `--print-manifest` to bootstrap. Operator installs via
# `cargo install nexo-plugin-google`; binary lands in
# `$HOME/.cargo/bin/nexo-plugin-google` and the walker
# auto-discovers without a manifest config edit.
[plugin.entrypoint]
command = "nexo-plugin-google"

[plugin.requires]
nexo_capabilities = ["broker"]

# Phase 81.33.b.real auto-discovery broker handler subscribe
# allowlist. Defense-in-depth so the plugin can only handle the
# topics it owns.
[plugin.capabilities.broker]
subscribe = [
    "plugin.outbound.google",
    "plugin.outbound.google.>",
    "plugin.google.admin.>",
    "plugin.google.http.request",
]
publish = []

# Per-plugin tool namespace allowlist (Phase 81.3). Daemon
# enforces every tool name advertised by this plugin's
# initialize-reply matches this list.
[plugin.tools]
expose = [
    "google_auth_start",
    "google_auth_status",
    "google_call",
    "google_auth_revoke",
]

# Daemon registers one `RemoteToolHandler` per tool listed here at
# boot. Tool descriptions + JSON-Schemas ship in the subprocess's
# initialize-reply (`PluginAdapter::declare_tools`) — chosen over
# `[[plugin.tools.outbound]]` because the daemon's RemoteToolHandler
# delivers `agent_id` in the `tool.invoke` params, which the google
# subprocess uses to key its per-agent DashMap. Mirrors telegram's
# pattern (the canonical extracted-plugin precedent).
[plugin.extends]
tools = [
    "google_auth_start",
    "google_auth_status",
    "google_call",
    "google_auth_revoke",
]

# Phase 81.33.b.real Stage 4 — admin RPC commands forwarded via
# broker. Daemon receives `nexo/admin/google/<verb>` from operators
# + forwards to `plugin.google.admin.<verb>`.
[plugin.admin]
method_prefix       = "nexo/admin/google/"
broker_topic_prefix = "plugin.google.admin"
timeout_seconds     = 15

# Phase 94 FU#4 — daemon mounts HTTP proxy under `/google`.
# Forwards requests via broker JSON-RPC. The plugin owns its
# internal router; today only `/google/status` exists (returns
# plugin metadata + per-account OAuth status snapshot). Future
# routes can land without daemon-side path-matchers.
[plugin.http]
mount_prefix    = "/google"
timeout_seconds = 15

# Phase 93.4 — declarative config contract. Daemon delivers
# Phase 94 v0.2.1 — operator YAML at
# `<config_dir>/plugins/google-auth.yaml` (legacy stem retained for
# back-compat) — daemon's discovery walker reads it into
# `entries["google-auth"]` and the plugin merges from there OR
# directly reads `$NEXO_CONFIG_DIR/plugins/google-auth.yaml` (the
# preferred path so legacy operators aren't forced to rename).
# Both code paths land in the same in-memory state.
#
# Top-level shape is an object with `accounts:` array, mirroring
# the `google-auth.yaml` operators already maintain. Each account
# binds to an agent via `agent_id`; an agent can hold MULTIPLE
# Google accounts (multi-instance × multi-agent), matching email's
# pattern.
[plugin.config_schema]
shape  = "object"
schema = '''{
  "type": "object",
  "properties": {
    "accounts": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id":                  { "type": "string" },
          "agent_id":            { "type": "string" },
          "client_id_path":      { "type": "string" },
          "client_secret_path":  { "type": "string" },
          "token_path":          { "type": "string" },
          "scopes":              { "type": "array", "items": { "type": "string" } },
          "redirect_port":       { "type": "integer", "minimum": 0, "maximum": 65535 }
        },
        "required": ["id", "agent_id", "client_id_path", "client_secret_path", "token_path", "scopes"]
      }
    }
  },
  "required": ["accounts"]
}'''

# Phase 94 v0.2.1 — credential store opt-out. Google's OAuth
# credentials live as file paths inside `google-auth.yaml` accounts;
# the plugin reads them directly via `SecretSources` (lazy refresh on
# mtime change). The generic `RemoteCredentialStore` abstraction
# would just add JSON-RPC round-trips without value.
[plugin.credentials_schema]
enabled = false

# Phase 81.33.b.real Stage 6 — setup wizard dashboard surface.
# Google is multi-agent-internal: the wizard walks per-agent
# subdirs of the workspace (one `google_tokens.json` per agent).
[plugin.dashboard.layout]
kind   = "workspace_walk"
subdir = "google"

[plugin.dashboard.auth_check]
kind       = "session_dir_files"
candidates = ["google_tokens.json"]

# Phase 99 — admin UI contribution: the [plugin.admin_ui] section
# (dynamic OAuth-status screen) is BLOCKED on publishing a
# nexo-plugin-manifest version that carries the `admin_ui` field —
# this plugin pins the crates.io release (deny_unknown_fields makes
# the new section a hard parse error until then). The broker
# handlers (`admin_ui/describe` + `admin_ui/config_set`) already
# ship in src/auto_discovery.rs, ready to activate once the section
# is added post-publish. See FOLLOWUPS Phase 99.
